[flipster_api]
base_url = "https://trading-api.flipster.io"
ws_url = "wss://trading-api.flipster.io/api/v1/stream"
# api_key, api_secret → 환경변수 FLIPSTER_API_KEY, FLIPSTER_API_SECRET 사용

[flipster_feed]
mode = "zmq"  # "zmq" (원격 직접 연결) 또는 "ipc" (로컬 data_subscriber)
zmq_address = "tcp://211.181.122.104:7000"
ipc_socket_path = "/tmp/flipster_data_subscriber.sock"
symbols = []  # 빈 리스트 = 모든 심볼
process_id = "strategy_main"

# ── 외부 거래소 피드 (동일 wire format: 120B bookticker, 128B trade) ──

[[exchange_feeds]]
exchange = "binance"
zmq_address = "tcp://211.181.122.24:6000"
enabled = true
topics = []

# [[exchange_feeds]]
# exchange = "gate"
# zmq_address = "tcp://211.181.122.24:5559"
# enabled = false

# [[exchange_feeds]]
# exchange = "bybit"
# zmq_address = "tcp://211.181.122.24:5558"
# enabled = false

# [[exchange_feeds]]
# exchange = "bitget"
# zmq_address = "tcp://211.181.122.24:6010"
# enabled = false

# [[exchange_feeds]]
# exchange = "okx"
# zmq_address = "tcp://211.181.122.24:6011"
# enabled = false

[strategy]
tick_interval_ms = 10

[market_stats]
# 전체 perpetual ticker 주기 풀링 (funding/OI/24h volume 등)
enabled = true
interval_ms = 10000

[snapshot_history]
# (거래소, 심볼)별 호가 시계열 롤링 저장
# 50ms 간격, 최근 60s 보관 (∼1200 샘플/심볼)
enabled = true
interval_ms = 50
max_age_sec = 60.0
