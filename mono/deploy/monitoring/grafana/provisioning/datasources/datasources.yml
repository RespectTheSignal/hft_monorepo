apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: QuestDB
    uid: questdb
    type: postgres
    access: proxy
    url: questdb:8812
    database: qdb
    user: admin
    secureJsonData:
      password: "quest"
    jsonData:
      sslmode: disable
      maxOpenConns: 4
      postgresVersion: 1200
    editable: false
