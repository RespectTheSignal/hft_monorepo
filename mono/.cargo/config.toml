# 캐시 지향 빌드 설정
# target-cpu=native 는 현재 빌드 머신의 L1/L2 크기·AVX 레벨을 최대로 활용.

[build]
# 병렬 컴파일 스레드는 cargo 기본값에 맡김 (nproc)

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",
    # mold linker 가 설치돼 있으면 링크 시간이 5~10배 빨라짐
    # "-C", "link-arg=-fuse-ld=mold",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
]

[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-cpu=native",
]

[net]
git-fetch-with-cli = true

[registries.crates-io]
protocol = "sparse"
