[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "hft_strategy_shm"
version = "0.1.0"
description = "Python binding for hft-strategy-shm — SharedRegion facade for strategy VMs."
requires-python = ">=3.9"
license = { text = "UNLICENSED" }
authors = [{ name = "sigma13-K", email = "sigma13@kaist.ac.kr" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Rust",
  "Operating System :: POSIX :: Linux",
  "Topic :: Office/Business :: Financial",
]

[tool.maturin]
# python-source = Python 쪽 순수 파이썬 레이어 (lightweight wrappers/consts).
# module-name = PyO3 #[pymodule] 이름. 실제 binary 는
#     python/hft_strategy_shm/_core.cpython-*.so 로 떨어진다.
python-source = "python"
module-name = "hft_strategy_shm._core"
features = ["pyo3/extension-module"]
